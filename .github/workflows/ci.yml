name: CI

on:
  pull_request:
  push:

jobs:
  unit-test:
    name: "Unit Test"
    uses: dosquad/actions/.github/workflows/unit-test.yml@main

  goreleaser:
    name: "Goreleaser"
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - unit-test
    uses: dosquad/actions/.github/workflows/goreleaser.yml@main
    secrets:
      HOMEBREW_GITHUB_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
