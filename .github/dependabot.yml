version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-gomod-deps:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/magefiles/"
    schedule:
      interval: "weekly"
    groups:
      all-mage-gomod-deps:
        patterns:
          - "*"
